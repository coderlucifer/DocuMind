# DocuMind Redis Configuration

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (RDB snapshots)
save 900 1
save 300 10
save 60 10000

# Append-only file
appendonly yes
appendfsync everysec

# Networking
bind 0.0.0.0
protected-mode no
timeout 300
tcp-keepalive 300

# Logging
loglevel notice
